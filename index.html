    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .pop-up { animation: popUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popUp {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }

        .bg-dashboard {
            background-color: #0f172a;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
    </style>

    <script>
    // สคริปต์ทำงานทันที (ไม่ต้องรอโหลด HTML)
    (function() {
        const currentUser = JSON.parse(localStorage.getItem('active_user'));
        const now = new Date().getTime();

        // ตรวจสอบ: ถ้าไม่มีข้อมูล หรือ เวลาในบัตรผ่านหมดอายุแล้ว
        if (!currentUser || now > currentUser.expireAt) {
            // เด้งไปหน้า Login ทันทีแบบไม่บันทึก History (กด Back กลับมาไม่ได้)
            window.location.replace('https://hy-c9.github.io/Smart-Ai-Login/');
        }
    })();
</script>

    <script>
        // ----------------------------------------------------
        // ตั้งค่าลิงก์หน้า Login (อัปเดตเป็นลิงก์ของคุณแล้ว)
        // ----------------------------------------------------
        const LOGIN_URL = 'https://hy-c9.github.io/Smart-Ai-Login/';
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzuV8aqMNFhtf9TI-bt9DC59bD9J2-CEfWj4ebHnFpu53gCOBCpcYm1QmyT6d1F70Lx/exec';
        
        let globalUsers = []; 
        let timerInterval; 

        // ==========================================
        // 1. ระบบด่านตรวจคนเข้าเมือง (Security Gate)
        // ==========================================
        window.onload = () => {
            const currentUser = JSON.parse(localStorage.getItem('active_user'));
            const lastActiveDay = localStorage.getItem('last_active_day');
            const todayDate = new Date().toDateString();

            // 1.1 ถ้าไม่มีข้อมูลล็อคอิน ให้เตะกลับไปหน้า Login ทันทีแบบไม่ให้มีร่องรอยการกด Back
            if (!currentUser) {
                window.location.replace(LOGIN_URL);
                return;
            }

            // 1.2 ถ้ามีข้อมูล แต่พบว่า "ข้ามวันใหม่แล้ว" ให้บังคับล็อคอินใหม่
            if (lastActiveDay && lastActiveDay !== todayDate) {
                alert("สิ้นสุดการใช้งานของวันนี้ กรุณาเข้าสู่ระบบใหม่");
                logoutUser();
                return;
            }

            // ถ้าผ่านด่าน ให้จำวันที่ล่าสุดไว้
            localStorage.setItem('last_active_day', todayDate);

            // แสดงชื่อและเริ่มระบบ
            document.getElementById('dash-username').textContent = currentUser.username;
            document.getElementById('dash-expire-date').textContent = formatDate(currentUser.expireAt);
            
            DatabaseAPI.init(); // โหลดข้อมูล Google Sheets พื้นหลัง
            startTimer();
            switchSystemMode('makeup'); // ตั้งหน้าแรก
        };

        const DatabaseAPI = {
            init: async () => {
                try {
                    const response = await fetch(WEB_APP_URL);
                    globalUsers = await response.json();
                } catch (error) {
                    console.error("โหลดข้อมูลล้มเหลว", error);
                    globalUsers = [];
                }
            },
            getUsers: () => globalUsers
        };

        // ==========================================
        // 2. ระบบ AI เวลาอัจฉริยะ (Smart Time Tracking)
        // ==========================================
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const currentUser = JSON.parse(localStorage.getItem('active_user'));
                if (!currentUser) return;

                // เช็คว่าข้ามวันหรือยังขณะที่เปิดเว็บทิ้งไว้?
                const todayDate = new Date().toDateString();
                const lastActiveDay = localStorage.getItem('last_active_day');
                if (lastActiveDay && lastActiveDay !== todayDate) {
                    alert("สิ้นสุดการใช้งานของวันนี้ กรุณาเข้าสู่ระบบใหม่");
                    logoutUser();
                    return;
                }

                // ดึงข้อมูลอัปเดตจาก Database
                const dbUsers = DatabaseAPI.getUsers();
                let realUserData = currentUser;

                if (dbUsers.length > 0) {
                    const foundUser = dbUsers.find(u => u.username === currentUser.username);
                    if (!foundUser) {
                        alert("บัญชีของคุณถูกลบออกจากระบบ");
                        logoutUser();
                        return;
                    }
                    realUserData = foundUser;
                }

                // คำนวณเวลาที่เหลือ
                const now = new Date().getTime();
                const diff = realUserData.expireAt - now;

                if (diff <= 0) {
                    document.getElementById('dash-countdown').textContent = "หมดเวลาการใช้งาน";
                    document.getElementById('dash-countdown').className = "text-sm font-bold font-mono text-red-500 animate-pulse";
                    alert("เวลาการใช้งานของคุณหมดแล้ว กรุณาติดต่อผู้ดูแลระบบ");
                    logoutUser();
                    return;
                }

                // ระบบแสดงเวลาให้ฉลาดขึ้น (Days, Hours, Minutes, Seconds)
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                let timeString = '';
                if (days > 0) {
                    timeString = `${days} วัน ${hours} ชม.`;
                } else if (hours > 0) {
                    timeString = `${hours} ชม. ${minutes} นาที`;
                } else {
                    timeString = `${minutes} นาที ${seconds} วินาที`;
                }

                document.getElementById('dash-countdown').textContent = timeString;
                localStorage.setItem('active_user', JSON.stringify(realUserData));
            }, 1000); 
        }

        // ==========================================
        // 3. ฟังก์ชันออกจากระบบ (Logout)
        // ==========================================
        function logoutUser() {
            // ล้างข้อมูลทุกอย่างให้เกลี้ยง
            localStorage.removeItem('active_user');
            localStorage.removeItem('last_active_day');
            clearInterval(timerInterval);
            
            // เตะกลับไปหน้า Login ทันทีแบบไม่บันทึกประวัติกลับ
            window.location.replace(LOGIN_URL); 
        }

        function formatDate(timestamp) {
            const d = new Date(timestamp);
            return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}  ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        // ==========================================
        // 4. UI เมนู และ รายการ
        // ==========================================
        let currentVerificationModeIsSuccess = true; 
        let currentActionName = '';
        let currentSystemMode = 'makeup'; 

        const stateDashboard = document.getElementById('state-dashboard');
        const stateVerification = document.getElementById('state-verification');

        const imgMakeup = "https://img5.pic.in.th/file/secure-sv1/imagef24e02695c33e0c7.md.png";
        const imgSmartContract = "https://img5.pic.in.th/file/secure-sv1/photo_--_--98bf3ff2cc85b3bd.md.jpg";

        const menuItems = [
            { name: "บันทึกช่วยจำ.", status: "✅" }, { name: "บันทึกช่วยจำ.", status: "❌" },
            { name: "หมายเหตุถอน.", status: "✅" }, { name: "หมายเหตุถอน.", status: "❌" },
            { name: "ถอน 3%.", status: "✅" }, { name: "ถอน 3%.", status: "❌" },
            { name: "ถอน 2 ยอด.", status: "✅" }, { name: "ถอน 2 ยอด.", status: "❌" },
            { name: "ถอนเกินเวลา.", status: "✅" }, { name: "ถอนเกินเวลา.", status: "❌" }
        ];

        function switchSystemMode(mode) {
            currentSystemMode = mode;
            
            const btnMakeup = document.getElementById('btn-mode-makeup');
            const btnSmart = document.getElementById('btn-mode-smart');
            const btnDocument = document.getElementById('btn-mode-document');

            [btnMakeup, btnSmart, btnDocument].forEach(btn => {
                if(btn) btn.classList.remove('bg-slate-700', 'border-slate-500');
            });

            if(mode === 'makeup') {
                if(btnMakeup) btnMakeup.classList.add('bg-slate-700', 'border-slate-500');
            } else if (mode === 'smart') {
                if(btnSmart) btnSmart.classList.add('bg-slate-700', 'border-slate-500');
            } else if (mode === 'document') {
                if(btnDocument) btnDocument.classList.add('bg-slate-700', 'border-slate-500');
            }

            const headerTitle = document.getElementById('dashboard-header-title');
            if(headerTitle) {
                headerTitle.textContent = mode === 'document' ? "รายการเอกสารของระบบ" : "เลือกระบบที่ต้องการดำเนินการ";
            }

            renderDashboardGrid(); 
        }

        function renderDashboardGrid() {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';
            
            if (currentSystemMode === 'document') {
                grid.className = "grid grid-cols-1 md:grid-cols-2 gap-4"; 
                const docItems = [
                    { name: "เอกสารขยายเวลา", img: imgMakeup, link: "https://hy-c9.github.io/Smart-Ai-timeK1/" },
                    { name: "เอกสารขยายเวลา", img: imgSmartContract, link: "https://hy-c9.github.io/Smart-Ai-timeM1/" },
                    { name: "เอกสารซ่อม 3%", img: imgMakeup, link: "ใส่ลิงก์ของคุณที่นี่_3" },
                    { name: "เอกสารซ่อม 3%", img: imgSmartContract, link: "https://hy-c9.github.io/Smart-Ai-3m/" },
                    { name: "เอกสารซ่อมบันทึก", img: imgMakeup, link: "ใส่ลิงก์ของคุณที่นี่_5" },
                    { name: "เอกสารซ่อมบันทึก", img: imgSmartContract, link: "ใส่ลิงก์ของคุณที่นี่_6" },
                    { name: "เอกสาร", img: imgMakeup, link: "ใส่ลิงก์ของคุณที่นี่_7" },
                    { name: "เอกสาร", img: imgSmartContract, link: "ใส่ลิงก์ของคุณที่นี่_8" },
                    { name: "เอกสาร", img: imgMakeup, link: "ใส่ลิงก์ของคุณที่นี่_9" },
                    { name: "เอกสาร", img: imgSmartContract, link: "ใส่ลิงก์ของคุณที่นี่_10" }
                ];
                
                docItems.forEach((item) => {
                    let btnAction = (item.link && !item.link.includes("ใส่ลิงก์ของคุณที่นี่")) 
                        ? `window.location.href = '${item.link}'` 
                        : `alert('หากต้องการเพิ่มเอกสาร ติดต่อเห่ายวิ้น')`;

                    grid.innerHTML += `
                        <div class="bg-[#1e293b] rounded-xl p-4 flex items-center justify-between border border-slate-700 shadow-md hover:bg-slate-800 transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 bg-white rounded-lg p-1.5 flex flex-shrink-0 items-center justify-center shadow-sm overflow-hidden">
                                    <img src="${item.img}" class="max-w-full max-h-full object-contain rounded-[6px]">
                                </div>
                                <h3 class="text-slate-100 font-bold text-[15px] tracking-wide">${item.name}</h3>
                            </div>
                            <button onclick="${btnAction}" class="bg-[#5b51d8] hover:bg-[#483fbe] text-white font-medium py-2 px-4 rounded-lg shadow-sm transition-colors text-sm shrink-0 flex items-center gap-1.5">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                เปิด
                            </button>
                        </div>
                    `;
                });
                return;
            }

            grid.className = "grid grid-cols-1 md:grid-cols-2 gap-4"; 
            const displayImage = (currentSystemMode === 'smart') ? imgSmartContract : imgMakeup;

            menuItems.forEach((item) => {
                const isGreen = item.status === "✅";
                const iconColor = isGreen ? "text-emerald-500" : "text-red-500";
                let buttonAction = `openVerification('${item.status}', '${item.name}')`;
                
                grid.innerHTML += `
                    <div class="bg-[#18202F] rounded-xl p-3 flex items-center justify-between border border-slate-700 shadow-md hover:bg-slate-800 transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-11 h-11 bg-white rounded-lg p-1 flex-shrink-0 flex items-center justify-center shadow-sm overflow-hidden">
                                <img src="${displayImage}" class="max-w-full max-h-full object-contain rounded-[4px] group-hover:scale-110 transition-transform duration-300">
                            </div>
                            <h3 class="text-slate-100 font-bold text-[14px] flex items-center gap-2">
                                ${item.name} <span class="${iconColor} font-bold text-[15px] drop-shadow-sm">${item.status}</span>
                            </h3>
                        </div>
                        <button onclick="${buttonAction}" class="bg-[#0F767D] hover:bg-[#0c5e64] text-white font-medium py-1.5 px-5 rounded-lg shadow-sm transition-colors text-[13px] shrink-0">
                            เปิด
                        </button>
                    </div>
                `;
            });
        }

        // ==========================================
        // 5. ระบบกดตรวจสอบ Slip
        // ==========================================
        function openVerification(status, actionTitle) {
            currentVerificationModeIsSuccess = (status === '✅');
            currentActionName = actionTitle.replace(".", "");
            
            const targetImage = (currentSystemMode === 'smart') ? imgSmartContract : imgMakeup;
            document.getElementById('verify-logo').src = targetImage;
            document.getElementById('result-form-logo').src = targetImage;
            
            document.getElementById('form-title').textContent = "AI SMART CONTRACT";
            document.getElementById('result-head-title').textContent = "AI SMART CONTRACT";

            stateDashboard.classList.add('hidden');
            stateDashboard.classList.remove('flex');
            stateVerification.classList.remove('hidden');
            stateVerification.classList.add('flex');
        }

        function goToDashboard() {
            stateVerification.classList.add('hidden');
            stateVerification.classList.remove('flex');
            stateDashboard.classList.remove('hidden');
            stateDashboard.classList.add('flex');
        }

        const form = document.getElementById('verification-form');
        const fileInput = document.getElementById('file-upload');
        const dropZoneContent = document.getElementById('drop-zone-content');
        const formPreviewImage = document.getElementById('form-preview-image');
        const appLoadingOverlay = document.getElementById('loading-overlay');
        const resultOverlay = document.getElementById('result-overlay');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        function processFile(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    dropZoneContent.classList.add('hidden');
                    formPreviewImage.src = e.target.result;
                    formPreviewImage.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        document.addEventListener('paste', function(e) {
            if(stateVerification.classList.contains('hidden')) return; 
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    processFile(file);
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;
                    break;
                }
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault(); 
            const shopId = document.getElementById('shop-id').value;
            const file = fileInput.files[0];
            if(!shopId || !file) return alert('กรุณาวางรูปภาพ Slip ก่อนดำเนินการตรวจสอบ');

            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('result-image').src = e.target.result; }
            reader.readAsDataURL(file);

            document.getElementById('result-shop-id').textContent = shopId;
            startAIVerification();
        });

        function startAIVerification() {
            appLoadingOverlay.classList.remove('hidden');
            let progress = 0;
            const totalDuration = 2000; 
            const updateInterval = 50; 
            const step = 100 / (totalDuration / updateInterval);
            
            const interval = setInterval(() => {
                progress += step; 
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => { showResult(); }, 100); 
                }
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `${Math.floor(progress)}%`;
            }, updateInterval);
        }

        function showResult() {
            appLoadingOverlay.classList.add('hidden');
            resultOverlay.classList.remove('hidden');
            
            const resultMsgBox = document.getElementById('result-message-box');
            const resultTitle = document.getElementById('result-title');

            let titleText = "ผลการตรวจสอบรหัสสำคัญ";
            let msgSuccess = "หมายเหตุ: ระบบดำเนินการอ่านข้อมูลรหัสสำคัญ สำเร็จ.";
            let msgFail = "หมายเหตุ: ระบบไม่สามารถดำเนินการอ่านข้อมูลรหัสสำคัญในการทำรายการได้.";

            if (currentActionName === "หมายเหตุถอน") {
                titleText = "ผลการตรวจสอบถอนเงิน";
                msgSuccess = "หมายเหตุ: ระบบ AI SMART CONTRACT ดำเนินการอ่านหมายเหตุถอนเงิน สำเร็จ.";
                msgFail = "หมายเหตุ: ระบบ ไม่สามารถดำเนินการอ่านหมายเหตุถอนเงินได้.";
            } 
            else if (currentActionName === "ถอน 3%") {
                titleText = "ผลการตรวจสอบค่าดำเนินการ 3%";
                msgSuccess = "หมายเหตุ: ระบบตรวจสอบค่าดำเนินการ 3% สำเร็จ.";
                msgFail = "หมายเหตุ: ระบบ ไม่สามารถดำเนินการตรวจสอบค่าดำเนินการ 3% ได้.";
            } 
            else if (currentActionName === "ถอน 2 ยอด") {
                titleText = "ผลการตรวจสอบถอนเงินสองยอด";
                msgSuccess = "หมายเหตุ: ระบบตรวจสอบค่าดำเนินการ 3% สำเร็จ.";
                msgFail = "หมายเหตุ: ระบบ ไม่สามารถดำเนินการตรวจสอบ การเบิกถอนสองยอดได้.";
            } 
            else if (currentActionName === "ถอนเกินเวลา") {
                titleText = "ผลการตรวจสอบถอนเงินตามเวลาที่กำหนด";
                msgSuccess = "หมายเหตุ: ระบบ ตรวจสอบเวลาในการเบิกถอนเงินที่กำหนด สำเร็จ.";
                msgFail = "หมายเหตุ: ระบบไม่สามารถตรวจสอบ การเบิกถอนเวลาที่กำหนดได้.";
            }

            resultTitle.textContent = titleText;

            if (currentVerificationModeIsSuccess) {
                resultTitle.className = "text-lg font-bold text-[#0F767D] mb-3";
                resultMsgBox.className = "mt-4 text-[#0F767D] text-sm font-medium text-center w-full px-5 py-4 bg-emerald-50 rounded-xl border border-emerald-200 shadow-sm leading-relaxed";
                resultMsgBox.textContent = msgSuccess;
            } else {
                resultTitle.className = "text-lg font-bold text-red-600 mb-3";
                resultMsgBox.className = "mt-4 text-red-600 text-sm font-medium text-center w-full px-5 py-4 bg-red-50 rounded-xl border border-red-200 shadow-sm leading-relaxed";
                resultMsgBox.textContent = msgFail;
            }

            setTimeout(() => { progressBar.style.width = '0%'; progressText.textContent = '0%'; }, 500);
        }

        function closeResult() {
            resultOverlay.classList.add('hidden');
            fileInput.value = '';
            formPreviewImage.classList.add('hidden');
            formPreviewImage.src = '';
            dropZoneContent.classList.remove('hidden');
        }

        resultOverlay.addEventListener('click', function(e) {
            if (e.target === resultOverlay) closeResult();
        });
    </script>
</body>
</html>
